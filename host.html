<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Band Door | Scaries</title>
    <meta name="description" content="Scaries band door for approving song requests." />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f3ea;
        --muted: #cdbfb4;
        --line: rgba(248, 243, 234, 0.18);
        --panel: rgba(20, 18, 20, 0.78);
        --field: rgba(248, 243, 234, 0.09);
        --gold: #f5bf4d;
        --green: #4ebf8d;
        --red: #d92832;
        --blue: #69a7ff;
        --black: #0f0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(15, 13, 16, 0.58), rgba(15, 13, 16, 0.92)),
          url("assets/les-scaries-stage.png") center / cover fixed,
          #0f0d10;
      }

      main {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: clamp(22px, 5vw, 46px) 16px 34px;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      h1,
      h2,
      h3 {
        margin: 18px 0;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 0.9;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(42px, 10vw, 76px);
      }

      h2 {
        margin: 0;
        font-size: clamp(30px, 6vw, 48px);
      }

      h3 {
        margin: 0;
        font-size: clamp(24px, 5vw, 36px);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .panel,
      .host-card {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 4vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(18px);
      }

      form,
      .host-actions,
      .door-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      input {
        min-height: 44px;
        flex: 1 1 220px;
        border: 1px solid rgba(248, 243, 234, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--ink);
        background: var(--field);
        font: inherit;
      }

      button,
      .button {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(248, 243, 234, 0.18);
        border-radius: 8px;
        padding: 0 12px;
        color: #130f10;
        background: var(--gold);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.58;
        cursor: wait;
      }

      .yes {
        background: var(--green);
      }

      .no {
        color: var(--ink);
        background: var(--red);
      }

      .warn {
        background: var(--blue);
      }

      .secondary {
        color: var(--ink);
        background: rgba(248, 243, 234, 0.08);
      }

      .host-list {
        display: grid;
        gap: 16px;
        margin-top: 14px;
      }

      .door-dashboard {
        margin-top: 14px;
      }

      .door-toolbar,
      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
      }

      .door-section {
        display: grid;
        gap: 10px;
      }

      .door-section-list {
        display: grid;
        gap: 12px;
      }

      .host-card strong {
        font-size: 22px;
      }

      .host-card span,
      .host-card small,
      .host-meta {
        color: var(--muted);
      }

      .host-card > div {
        display: grid;
        gap: 4px;
      }

      .host-card.pending_payment {
        border-color: rgba(245, 191, 77, 0.48);
      }

      .host-card.accepted {
        border-color: rgba(78, 191, 141, 0.48);
      }

      .host-card.refund_needed {
        border-color: rgba(105, 167, 255, 0.48);
      }

      .host-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-pill {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        color: var(--gold);
        background: rgba(0, 0, 0, 0.22);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .host-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      code {
        color: var(--gold);
        font-weight: 900;
      }

      .door-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .door-stat {
        display: grid;
        gap: 3px;
        min-height: 72px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
      }

      .door-stat strong {
        color: var(--ink);
        font-size: 24px;
      }

      .door-stat span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .empty-door {
        padding: 22px;
        border: 1px dashed rgba(248, 243, 234, 0.24);
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 640px) {
        form,
        .host-actions,
        .door-actions {
          display: grid;
        }

        .host-topline,
        .door-stats,
        .door-toolbar,
        .section-head {
          display: grid;
        }

        button,
        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body data-page="host">
    <main>
      <a href="index.html">&larr; Links</a>
      <h1>Band Door</h1>

      <section class="panel" data-host-gate>
        <form data-host-login>
          <input data-host-code type="password" placeholder="Band host code" autocomplete="current-password" />
          <button type="submit">Open Door</button>
        </form>
        <p>Everyone in the band can use the same code. Leave this open to see requests land live.</p>
        <p data-backend-status>Connecting...</p>
        <p data-host-status>Enter the host code to run the door.</p>
      </section>

      <section class="panel door-dashboard" data-host-dashboard hidden>
        <div class="door-toolbar">
          <div>
            <h2>Requests</h2>
            <p data-host-dashboard-status>Opening the door...</p>
          </div>
          <div class="door-actions">
            <button class="secondary" type="button" data-host-refresh>Refresh</button>
            <a class="button secondary" href="host.html">Lock Door</a>
          </div>
        </div>
        <div class="door-stats" data-host-stats hidden></div>
      </section>

      <section class="host-list" data-host-list hidden></section>
    </main>

    <script src="supabase-config.js?v=queue-fix-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=queue-fix-1"></script>
  </body>
</html>
