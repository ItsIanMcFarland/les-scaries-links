<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Host | Scaries</title>
    <meta name="description" content="Scaries host queue controls." />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f3ea;
        --muted: #cdbfb4;
        --line: rgba(248, 243, 234, 0.18);
        --panel: rgba(20, 18, 20, 0.78);
        --field: rgba(248, 243, 234, 0.09);
        --gold: #f5bf4d;
        --green: #4ebf8d;
        --red: #d92832;
        --black: #0f0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(15, 13, 16, 0.58), rgba(15, 13, 16, 0.92)),
          url("assets/les-scaries-stage.png") center / cover fixed,
          #0f0d10;
      }

      main {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: clamp(22px, 5vw, 46px) 16px 34px;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      h1 {
        margin: 18px 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(42px, 10vw, 76px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .panel,
      .host-card {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 4vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(18px);
      }

      form,
      .host-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      input {
        min-height: 44px;
        flex: 1 1 220px;
        border: 1px solid rgba(248, 243, 234, 0.2);
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--ink);
        background: var(--field);
        font: inherit;
      }

      button,
      .button {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(248, 243, 234, 0.18);
        border-radius: 8px;
        padding: 0 12px;
        color: #130f10;
        background: var(--gold);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      .secondary {
        color: var(--ink);
        background: rgba(248, 243, 234, 0.08);
      }

      .host-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .host-card strong {
        font-size: 20px;
      }

      .host-card span,
      .host-card small,
      .host-meta {
        color: var(--muted);
      }

      .host-card > div {
        display: grid;
        gap: 4px;
      }

      .host-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      code {
        color: var(--gold);
        font-weight: 900;
      }

      @media (max-width: 640px) {
        form,
        .host-actions {
          display: grid;
        }

        button,
        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body data-page="host">
    <main>
      <a href="index.html">&larr; Links</a>
      <h1>Host</h1>

      <section class="panel">
        <form data-host-login>
          <input data-host-code type="password" placeholder="Host code" autocomplete="current-password" />
          <button type="submit">Unlock</button>
          <button class="secondary" type="button" data-host-refresh>Refresh</button>
        </form>
        <p data-backend-status>Connecting...</p>
        <p data-host-status>Enter the host code to manage requests.</p>
      </section>

      <section class="host-list" data-host-list></section>
    </main>

    <script src="supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
