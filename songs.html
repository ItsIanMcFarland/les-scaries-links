<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Song List | Scaries</title>
    <meta name="description" content="Browse the local Scaries song list." />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f3ea;
        --muted: #cdbfb4;
        --line: rgba(248, 243, 234, 0.18);
        --panel: rgba(20, 18, 20, 0.78);
        --field: rgba(248, 243, 234, 0.09);
        --gold: #f5bf4d;
        --black: #0f0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(15, 13, 16, 0.58), rgba(15, 13, 16, 0.92)),
          url("assets/les-scaries-stage.png") center / cover fixed,
          #0f0d10;
      }

      main {
        width: min(100%, 760px);
        margin: 0 auto;
        padding: clamp(22px, 5vw, 46px) 16px 34px;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      h1 {
        margin: 18px 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(42px, 10vw, 76px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 4vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(18px);
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(248, 243, 234, 0.2);
        border-radius: 8px;
        padding: 12px 13px;
        color: var(--ink);
        background: var(--field);
        font: inherit;
      }

      .count {
        color: var(--gold);
        font-size: 13px;
        font-weight: 900;
      }

      .catalog {
        display: grid;
        gap: 8px;
      }

      .catalog-song {
        display: grid;
        grid-template-columns: 48px 1fr;
        gap: 10px;
        align-items: center;
        min-height: 64px;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.22);
      }

      .catalog-song img {
        width: 48px;
        aspect-ratio: 1;
        border-radius: 6px;
        object-fit: cover;
      }

      .catalog-song span {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      small,
      code {
        color: var(--muted);
        font-size: 12px;
      }
    </style>
    <link rel="stylesheet" href="brand.css?v=les-punk-1" />
  </head>
  <body data-page="songs">
    <main>
      <a href="index.html">&larr; Links</a>
      <h1>Song List</h1>

      <section class="panel">
        <input data-catalog-search autocomplete="off" placeholder="Search by artist or song" />
        <span class="count" data-song-count>0 songs</span>
        <div class="catalog" data-song-list></div>
      </section>
    </main>

    <script src="supabase-config.js?v=repertoire-search-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=repertoire-search-1"></script>
  </body>
</html>
