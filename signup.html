<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join the Queue | Scaries</title>
    <meta name="description" content="Add yourself to the Scaries live-band karaoke queue." />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f3ea;
        --muted: #cdbfb4;
        --line: rgba(248, 243, 234, 0.18);
        --panel: rgba(20, 18, 20, 0.78);
        --field: rgba(248, 243, 234, 0.09);
        --gold: #f5bf4d;
        --green: #4ebf8d;
        --black: #0f0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(15, 13, 16, 0.54), rgba(15, 13, 16, 0.9)),
          url("assets/les-scaries-stage.png") center / cover fixed,
          #0f0d10;
      }

      main {
        width: min(100%, 560px);
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(22px, 5vw, 46px) 16px 34px;
        display: grid;
        align-content: center;
        gap: 16px;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(42px, 11vw, 74px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 4vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 14px;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(248, 243, 234, 0.2);
        border-radius: 8px;
        padding: 12px 13px;
        color: var(--ink);
        background: var(--field);
        font: inherit;
      }

      input:focus {
        border-color: rgba(245, 191, 77, 0.72);
        outline: 3px solid rgba(245, 191, 77, 0.16);
      }

      button {
        min-height: 48px;
        border: 1px solid rgba(248, 243, 234, 0.18);
        border-radius: 8px;
        color: #130f10;
        background: var(--gold);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .search-results {
        display: grid;
        gap: 6px;
        margin-top: 7px;
      }

      .song-result {
        min-height: 58px;
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 10px;
        align-items: center;
        padding: 8px;
        color: var(--ink);
        background: rgba(0, 0, 0, 0.38);
        text-align: left;
      }

      .song-result img {
        width: 42px;
        aspect-ratio: 1;
        border-radius: 6px;
        object-fit: cover;
      }

      .song-result span,
      .selected-song {
        display: grid;
        gap: 2px;
      }

      small {
        color: var(--muted);
        font-size: 12px;
      }

      .selected-song {
        padding: 10px;
        border: 1px solid rgba(78, 191, 141, 0.5);
        border-radius: 8px;
        background: rgba(78, 191, 141, 0.1);
      }

      .status {
        min-height: 20px;
        color: var(--gold);
        font-size: 13px;
        font-weight: 800;
      }
    </style>
  </head>
  <body data-page="request">
    <main>
      <a href="index.html">&larr; Queue</a>

      <section class="panel">
        <div>
          <h1>Join</h1>
          <p>Just your name and song. The song stores a Spotify track ID.</p>
        </div>

        <form data-request-form>
          <label>
            Name
            <input data-singer-name autocomplete="name" required />
          </label>

          <label>
            Song
            <input data-song-search autocomplete="off" placeholder="Search by song or artist" required />
            <span class="selected-song" data-selected-song hidden></span>
            <div class="search-results" data-search-results hidden></div>
          </label>

          <button type="submit">Add to Queue</button>
          <p class="status" data-form-status aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
