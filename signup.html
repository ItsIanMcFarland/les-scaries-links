<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request a Song | Scaries</title>
    <meta name="description" content="Request a song for Scaries live-band karaoke." />
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f3ea;
        --muted: #cdbfb4;
        --line: rgba(248, 243, 234, 0.18);
        --panel: rgba(20, 18, 20, 0.78);
        --field: rgba(248, 243, 234, 0.09);
        --gold: #f5bf4d;
        --green: #4ebf8d;
        --black: #0f0d10;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(15, 13, 16, 0.54), rgba(15, 13, 16, 0.9)),
          url("assets/les-scaries-stage.png") center / cover fixed,
          #0f0d10;
      }

      main {
        width: min(100%, 600px);
        margin: 0 auto;
        padding: clamp(22px, 5vw, 46px) 16px 34px;
        display: grid;
        gap: 16px;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      h1,
      h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 0.9;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(42px, 11vw, 74px);
      }

      h2 {
        font-size: clamp(30px, 8vw, 48px);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 4vw, 24px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 14px;
        font-weight: 800;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(248, 243, 234, 0.2);
        border-radius: 8px;
        padding: 12px 13px;
        color: var(--ink);
        background: var(--field);
        font: inherit;
      }

      input:focus {
        border-color: rgba(245, 191, 77, 0.72);
        outline: 3px solid rgba(245, 191, 77, 0.16);
      }

      button,
      .button {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(248, 243, 234, 0.18);
        border-radius: 8px;
        padding: 0 14px;
        color: #130f10;
        background: var(--gold);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      .secondary {
        color: var(--ink);
        background: rgba(248, 243, 234, 0.08);
      }

      .search-results {
        display: grid;
        gap: 6px;
        margin-top: 7px;
      }

      .song-result {
        min-height: 58px;
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 10px;
        align-items: center;
        padding: 8px;
        color: var(--ink);
        background: rgba(0, 0, 0, 0.38);
        text-align: left;
      }

      .write-in-result {
        grid-template-columns: 1fr;
        border-color: rgba(245, 191, 77, 0.48);
        background: rgba(245, 191, 77, 0.12);
      }

      .song-result img {
        width: 42px;
        aspect-ratio: 1;
        border-radius: 6px;
        object-fit: cover;
      }

      .song-result span,
      .selected-song {
        display: grid;
        gap: 2px;
      }

      small {
        color: var(--muted);
        font-size: 12px;
      }

      .selected-song {
        padding: 10px;
        border: 1px solid rgba(78, 191, 141, 0.5);
        border-radius: 8px;
        background: rgba(78, 191, 141, 0.1);
      }

      .request-modes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .mode-button {
        min-height: 44px;
        color: var(--ink);
        background: rgba(248, 243, 234, 0.08);
      }

      .mode-button.active {
        color: #130f10;
        background: var(--gold);
      }

      .field-group {
        display: grid;
        gap: 12px;
      }

      [hidden] {
        display: none !important;
      }

      .status {
        min-height: 20px;
        color: var(--gold);
        font-size: 13px;
        font-weight: 800;
      }

      .payment-code {
        display: grid;
        gap: 4px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.24);
      }

      .payment-code span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .payment-code strong {
        font-size: 24px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      @media (max-width: 520px) {
        .actions {
          display: grid;
        }
      }
    </style>
    <link rel="stylesheet" href="brand.css?v=les-punk-1" />
  </head>
  <body data-page="request">
    <main>
      <a href="index.html">&larr; Links</a>

      <section class="panel">
        <div>
          <h1>Request</h1>
          <p>Search the repertoire by artist or song, add your Venmo handle, then pay with the generated memo.</p>
          <p class="status" data-backend-status>Connecting...</p>
        </div>

        <form data-request-form>
          <label>
            Name
            <input data-singer-name autocomplete="name" required />
          </label>

          <label>
            Venmo handle
            <input data-venmo-handle autocomplete="off" placeholder="@yourhandle" required />
          </label>

          <div class="request-modes" role="group" aria-label="Request type">
            <button class="mode-button active" type="button" data-request-mode="catalog" aria-pressed="true">
              Repertoire $7
            </button>
            <button class="mode-button" type="button" data-request-mode="write_in" aria-pressed="false">
              Write-in $10
            </button>
          </div>

          <div class="field-group" data-catalog-fields>
            <label>
              Artist or song
              <input data-song-search autocomplete="off" placeholder="Try Chappell Roan or Mr. Brightside" required />
              <span class="selected-song" data-selected-song hidden></span>
              <div class="search-results" data-search-results hidden></div>
            </label>
            <small>Repertoire requests are $7 minimum.</small>
          </div>

          <div class="field-group" data-write-in-fields hidden>
            <label>
              Song title
              <input data-write-in-title autocomplete="off" placeholder="Song you want to sing" />
            </label>
            <label>
              Artist
              <input data-write-in-artist autocomplete="off" placeholder="Optional, but helpful" />
            </label>
            <small>Write-ins are $10 minimum and the host can approve, pass, or refund.</small>
          </div>

          <button type="submit">Create Venmo Memo</button>
          <p class="status" data-form-status aria-live="polite"></p>
        </form>
      </section>

      <section class="panel" data-payment-panel hidden></section>
    </main>

    <script src="supabase-config.js?v=write-in-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=write-in-1"></script>
  </body>
</html>
